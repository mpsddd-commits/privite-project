name: play

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    # runs-on: ubuntu-latest - 이건 github에서 제공하는 가상환경, 윈도우에서 설정하기 위해 self-hosted로 변경
    runs-on: self-hosted
    steps:
      # - uses: actions/checkout@v
      # - name: Check PowerShell - 확인용
      #   run: $PSVersionTable
      - name: Checkout repository
        uses: actions/checkout@v4
        # with:
        #   path: .
      # - name: Check Node.js version
      #   run: node -v

      - name: npm install
        working-directory: ./Front
        run: npm i
      
      - name: npm run build
        working-directory: ./Front
        run: npm run build

      
      - name: nginx start
        run: |
          docker rm -f web
          docker run -d -p 80:80 -v ./Front/dist:/usr/share/nginx/html -v ./Front/default.conf:/etc/nginx/conf.d/default.conf --name web nginx:1.28

      - name: uv image build
        working-directory: ./Back
        run: docker build -t uv:1 .

      - name: fastapi run
        working-directory: ./Back
        run: docker run -d -p 8001:8000 -v .:/workspace --name back uv:1